<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Syed Hilaluddin Madany</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        body {
            background-color: #09090B;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        h1,
        h2 {
            font-family: 'Outfit', sans-serif;
        }

        .gradient-text {
            background: linear-gradient(135deg, #14B8A6 0%, #10B981 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.15) 0%, rgba(9, 9, 11, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(40px);
            pointer-events: none;
        }

        .success-circle {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid #10B981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            color: #10B981;
            font-size: 2rem;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(16, 185, 129, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }
    </style>
</head>

<body class="antialiased relative">

    <div class="ambient-glow top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>

    <div class="glass-card p-10 md:p-16 rounded-3xl max-w-lg w-full text-center relative z-10 mx-4">
        <div class="success-circle">
            <i class="fa-solid fa-check"></i>
        </div>

        <h1 class="text-3xl md:text-5xl font-bold mb-4">Message <span class="gradient-text">Received</span></h1>

        <p class="text-slate-400 text-lg mb-8 leading-relaxed">
            Thank you for reaching out. Your proposal/inquiry has been successfully sent to my inbox. I will review it
            and get back to you shortly.
        </p>

        <a href="index.html"
            class="inline-block w-full bg-gradient-to-r from-[#14B8A6] to-[#10B981] text-white font-bold py-4 px-8 rounded-lg hover:shadow-[0_0_20px_rgba(20,184,166,0.4)] transition-all hover:-translate-y-1">
            Return to Portfolio
        </a>
    </div>

</body>

</html>
